version: '3.8'
services:

  mongo-db:
    image: mongo:6.0.6
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo-user
      MONGO_INITDB_ROOT_PASSWORD: 123456
    volumes:
      - ./mongoDB:/data/db
    ports:
      - 27017:27017


  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: iceplay_db
      POSTGRES_USER: iceplay_user
      POSTGRES_PASSWORD: iceplay_password
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      
