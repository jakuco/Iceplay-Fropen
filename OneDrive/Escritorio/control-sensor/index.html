<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitor de Sensor Ambiental</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #141e30, #243b55);
      color: white;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
    }
    .card {
      border: none;
      border-radius: 1rem;
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
    }
    .sensor-icon {
      font-size: 5rem;
      color: #0dcaf0;
    }
    .metric {
      font-size: 2rem;
    }
    .footer {
      margin-top: 3rem;
      text-align: center;
      font-size: 0.9rem;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="container py-5">
    <div class="text-center mb-5">
      <i class="fas fa-microchip sensor-icon mb-3"></i>
      <h1 class="fw-bold">Monitor Digital - Sensor Ambiental</h1>
      <p class="lead">Datos en tiempo real desde Azure Digital Twins</p>
    </div>

    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card text-white">
          <div class="card-body text-center">
            <h4 class="mb-4">📊 Lecturas actuales del gemelo <code>sensor1</code></h4>
            <p class="metric">🌡 Temperatura: <span id="temp">--</span> °C</p>
            <p class="metric">💧 Humedad: <span id="hum">--</span> %</p>
            <p class="text-muted">🕒 Última lectura: <span id="time">--</span></p>
            <button class="btn btn-outline-light mt-3" onclick="obtenerDatos()">
              <i class="fas fa-sync-alt"></i> Actualizar ahora
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="footer">
      <p>&copy; 2025 Proyecto Azure Digital Twins · Desarrollado por <strong>Andrés Meneses</strong></p>
    </div>
  </div>

  <script>
    const endpoint = "https://<TU-FUNCTION-APP>.azurewebsites.net/api/leerSensor1";

    async function obtenerDatos() {
      try {
        const res = await fetch(endpoint);
        const data = await res.json();
        document.getElementById("temp").innerText = data.temperatura ?? "--";
        document.getElementById("hum").innerText = data.humedad ?? "--";
        document.getElementById("time").innerText = data.timestamp ?? "--";
      } catch (error) {
        console.error("Error al obtener datos del gemelo digital:", error);
      }
    }

    // Carga inicial
    obtenerDatos();
  </script>
</body>
</html>
